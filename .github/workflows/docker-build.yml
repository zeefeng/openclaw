name: Build and Push to Aliyun ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show target image
        run: |
          echo "REGISTRY=${{ secrets.ALIYUN_REGISTRY }}"
          echo "NAMESPACE=${{ secrets.ALIYUN_NAME_SPACE }}"
          echo "IMAGE=${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/openclaw:latest"

      - name: Login to Aliyun ACR
        run: |
          echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login \
            --username "${{ secrets.ALIYUN_REGISTRY_USER }}" \
            --password-stdin "${{ secrets.ALIYUN_REGISTRY }}"

      - name: Build image
        run: |
          docker build -t "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/openclaw:latest" .

      - name: Push image
        run: |
          docker push "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/openclaw:latest"
