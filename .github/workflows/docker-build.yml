name: Build and Push to Aliyun

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Create Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM node:18-slim
          
          # 安装构建工具
          RUN apt-get update && apt-get install -y python3 make g++ && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          
          # 全局安装主程序，这样它就在系统路径中了
          RUN npm install -g openclaw
          
          # 预安装飞书组件
          RUN mkdir -p /app/extensions/feishu && \
              cd /app/extensions/feishu && \
              npm init -y && \
              npm install @larksuiteoapi/node-sdk
          
          # 核心修正：设置环境变量指向我们创建的插件目录
          ENV OPENCLAW_PLUGINS_DIR=/app/extensions
          ENV NODE_ENV=production
          
          EXPOSE 18789
          
          # 修正启动命令：直接运行全局命令 openclaw
          CMD ["openclaw", "start"]
          EOF

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/openclaw:latest
