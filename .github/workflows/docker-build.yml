name: Build and Push to Aliyun

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # 在构建服务器上动态生成 Dockerfile，确保 SDK 被打入镜像
      - name: Generate Inline Dockerfile
        run: |
          cat <<EOF > Dockerfile.feishu
          FROM node:18-slim
          
          # 1. 安装系统级依赖（npm 编译一些包时需要）
          RUN apt-get update && apt-get install -y python3 make g++ && rm -rf /var/lib/apt/lists/*
          
          WORKDIR /app
          
          # 2. 全局安装 OpenClaw
          RUN npm install -g openclaw
          
          # 3. 预创建飞书插件目录并安装 SDK
          # 这一步在 GitHub 端完成，不会消耗你阿里云服务器的内存
          RUN mkdir -p /app/extensions/feishu && \
              cd /app/extensions/feishu && \
              npm init -y && \
              npm install @larksuiteoapi/node-sdk
          
          # 4. 配置环境变量，确保插件加载路径正确
          ENV OPENCLAW_PLUGINS_DIR=/app/extensions
          ENV NODE_ENV=production
          
          EXPOSE 18789
          
          # 5. 启动命令
          CMD ["openclaw", "start"]
          EOF

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 使用我们刚刚生成的临时 Dockerfile
          file: ./Dockerfile.feishu
          push: true
          tags: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAME_SPACE }}/openclaw:latest
